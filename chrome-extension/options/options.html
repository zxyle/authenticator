<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TOTP 自动填充 - 选项</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <h1>TOTP 管理</h1>
    <section class="section">
      <h2>添加条目</h2>
      <div class="form">
        <label>名称 <input id="label" type="text" placeholder="例如：GitHub" /></label>
        <label>Secret (Base32) <input id="secret" type="text" placeholder="JBSWY3DPEHPK3PXP" /></label>
        <label>域名匹配（可选） <input id="domainPattern" type="text" placeholder="*.github.com 或留空" /></label>
        <button id="addBtn" type="button" class="btn btn-primary">添加</button>
      </div>
    </section>
    <section class="section">
      <h2>已保存的 TOTP</h2>
      <ul id="list" class="list"></ul>
    </section>
    <section class="section import-section">
      <h2>一键导入 Google Authenticator</h2>
      <p class="hint">在手机 Google Authenticator 中导出账号后，用另一设备拍照二维码并在这里上传。</p>
      <div class="form">
        <label>二维码图片 <input id="migrationImage" type="file" accept="image/*" /></label>
        <label>批量设置域名匹配（可选） <input id="importDomainPattern" type="text" placeholder="例如：*.github.com" /></label>
        <div class="import-actions">
          <button id="previewImportBtn" type="button" class="btn">预览导入</button>
          <button id="runImportBtn" type="button" class="btn btn-primary">确认导入</button>
          <button id="rollbackImportBtn" type="button" class="btn">撤销上次导入</button>
        </div>
        <div id="importStatus" class="import-status"></div>
      </div>
      <div id="importPreview" class="import-preview"></div>
    </section>
    <section class="section api-section">
      <h2>同步设置（预留）</h2>
      <p class="hint">后续可从后端 API 拉取 TOTP 列表，此处仅保存配置。</p>
      <div class="form">
        <label>API 端点 <input id="apiEndpoint" type="url" placeholder="https://api.example.com/totp" /></label>
        <label>认证 Token（可选） <input id="apiToken" type="password" placeholder="Bearer token" /></label>
        <button id="saveApiBtn" type="button" class="btn">保存 API 配置</button>
      </div>
    </section>
  </div>
  <script src="import-google-auth.js"></script>
  <script src="options.js"></script>
</body>
</html>
